# =========================================================================
# Stage 1 — BLE link verification (no TFLM yet).
# After link is confirmed working, re-enable the TFLite Micro section below
# and the C++ section to move to Stage 2 (inference).
# =========================================================================

# ---- Bluetooth (central role: scan, connect, GATT client) ----------------
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_SMP=y

# Buffer sizes for sustained ~60 Hz notifications, 12-byte payload
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_RX_STACK_SIZE=2048

# Enough subscriber / discovery params for one connection (we use one)
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# ---- Console / logging ---------------------------------------------------
CONFIG_PRINTK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2

# ---- Memory --------------------------------------------------------------
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192

# ---- GPIO (status LED, optional) -----------------------------------------
CONFIG_GPIO=y

# =========================================================================
# Stage 2 (uncomment after Stage 1 prints rate=60 Hz steadily)
# =========================================================================
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_CPP_EXCEPTIONS=n
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_TENSORFLOW_LITE_MICRO=y
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=32768
